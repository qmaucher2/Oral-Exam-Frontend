<!DOCTYPE html>

<body>

    <div id="div-for-buttons">

            <!--<button onclick="downloadRecording()" id="stop-button">end quiz</button>-->
        </section>
        <section>
            <form>
                <input type="file" id="file" accept="text/*"><br>
                <button id="AssignmentUpload">Submit your assingment</button>
            </form>
        </section>
    </div>
