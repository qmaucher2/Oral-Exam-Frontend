<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz</title>
    <link rel="stylesheet" href="../CSS/create-quiz.css">
    <script src="../JavaScript/create-quiz.js"></script>
</head>
<body>
    <header>
        <h1>Create Quiz</h1>
        <div id="signout">
            <div id="signout-button">
                <fieldset class="signout-border">
<!--                    <img src="User-icon.avif" alt="icon">&ndash;&gt;-->
                </fieldset>
                <a href="sign-in.html">Sign-Out</a>
            </div>
        </div>
    </header>
    <nav>
    </nav>
    <main>
        <button onclick="dontpushthisbutton()" id="dontpushthisbutton">dontpushthisbutton</button>
        <form id="Quiz-Creation-Form">
            <label>
                <input id="uservalue_subject" placeholder='Please list the Course subject.'>
            </label>
            <fieldset id="question_container">
                <div id="questionslist">
                    <label>
                        <a>Question 1.</a>
                        <br>
                        <textarea rows="5" cols="25" id="question1" class="question-field" placeholder="Enter Question 1 here."></textarea>
                        <textarea rows="5" cols="25" id="note1" class="notes-field" placeholder="Enter Notes to AI about Question 1 here."></textarea>
                    </label>
                    <br>
                </div>
                <div id="div-for-buttons">
                    <button id="addquestion_button" type="button" onclick="addquestion()">ADD QUESTION</button><br>
                    <label>
                        <button id="quizgenerate" type="button" onclick="generatequiz()">Generate Quiz with AI</button>
                    </label>
                    <div id="ai_input"></div>
                    <button id="savequiz" type="button" onclick="submitquiz()">SAVE QUIZ</button>
                    <!--                <button id="savequiz" type="button" onclick="submitquiz(); location.href='Template_Classroom_teacher_pov.html'">SAVE QUIZ</button>-->
                </div>
            </fieldset>
        </form>
    </main>
</body>
</html>
