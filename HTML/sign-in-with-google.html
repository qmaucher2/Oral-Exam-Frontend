<!DOCTYPE html>
<!--suppress JSUnresolvedReference -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>oral-exam_frontend_sign-in-with-google</title>
    <link rel="stylesheet" href="../CSS/sign-in-with-google.css">
</head>
<body>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<div id="g_id_onload"
     data-client_id=530338269563-idbk3qntbc8tn11n1uqli41424vjkn53.apps.googleusercontent.com
     data-callback="handleCredentialResponse"
     data-auto_prompt="false">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-size="large"
     data-theme="outline"
     data-text="sign_in_with"
     data-shape="rectangular"
     data-logo_alignment="left">
</div>

<script>
    // noinspection JSUnusedGlobalSymbols
    function handleCredentialResponse(response) {
        // decodeJwtResponse() is a custom function defined below
        const responsePayload = decodeJwtResponse(response.credential);

        console.log("ID: " + responsePayload.sub);
        console.log('Full Name: ' + responsePayload.name);
        console.log('Given Name: ' + responsePayload.given_name);
        console.log('Family Name: ' + responsePayload.family_name);
        console.log("Image URL: " + responsePayload.picture);
        console.log("Email: " + responsePayload.email);

        fetch('/n' + 'https://oral-exam-backend-307630687354.northamerica-northeast1.run.app/', {
            method: 'POST',
            headers: {
                "API_Key": process.env.API_KEY
            },
        })
            .then(response => response.json())
            .then(data => console.log(data));
    }

    // helps decode the user input
    function decodeJwtResponse(token) {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        return JSON.parse(jsonPayload);
    }


    /*
    if email ends in cpsd:
        if email[:1] is string:
            login as teacher
        else:
            login as student
    else:
        return error message
    
     */
</script>

</body>
</html>
