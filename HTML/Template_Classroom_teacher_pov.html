<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teacher-pov</title>
    <link rel="stylesheet" href="../CSS/Template_Classroom_teacher_pov.css">
    <script src="../JavaScript/post-quiz.js"></script>
</head>
<body>
<header>
    <h1>{Project Name}</h1>
    <div id="signout">

            <fieldset class="signout-border">
                <!--<img src="icon.png" alt="icon">-->
            </fieldset>
            <a href="sign-in.html">Sign-Out</a>
        </div>
    </div>
</header>
<section id="your-quizzes">
    <div>
        <fieldset>
            <h3>Your Quizzes</h3>
            <ul>
                <li><a href="Template-Quiz.txt">Template-Quiz</a></li>
            </ul>
            <button id="new-quiz"><a href="create-quiz.html">NEW QUIZ</a></button>

    </div>
</section>
<section id="post-quiz-section">
    <fieldset>
        <h2>Post quiz to classroom</h2>
        <form>
            <div id="quizlist-container">
                <select id="quizlist">
                    <option><a href="Template-Quiz.txt">Template-Quiz</a></option>
                </select>
            </div>
            <button onclick="post_quiz()" id="post-quiz">POST QUIZ</button>
        </form>
    </fieldset>
</section>
<section id="students_in_classroom">
    <fieldset>
        <h3>Students in classroom</h3>
        <div id="students-container">
            <ul id="students-list">
               <li></li>
            </ul>
        </div>
    </fieldset>
</section>
<section id="list of students">

    </ul>
</section>
